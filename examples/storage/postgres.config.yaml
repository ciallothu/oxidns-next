log:
  level: info

api:
  http:
    listen: ":9199"
    auth:
      type: accounts
      database: "./data/oxidns-next-auth.db"
      bootstrap_token_env: OXIDNS_NEXT_BOOTSTRAP_TOKEN
      session_ttl_seconds: 43200
    webui:
      root: "./webui"

plugins:
  - tag: query_log
    type: query_recorder
    args:
      database:
        type: postgres
        url: "${OXIDNS_NEXT_QUERY_DATABASE_URL}"
        max_connections: 8
        connect_timeout_ms: 5000
        acquire_timeout_ms: 3000
        query_timeout_ms: 20000
      reader_concurrency: 4
      retention_days: 7

  - tag: forward
    type: forward
    args:
      upstreams:
        - addr: "223.5.5.5"

  - tag: main_sequence
    type: sequence
    args:
      - exec: $query_log
      - exec: $forward
      - exec: accept

  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":53"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":53"
