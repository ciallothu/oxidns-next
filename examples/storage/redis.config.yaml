log:
  level: info

storage:
  redis:
    url: "redis://redis:6379/0"
    key_prefix: "oxidns-next"
    connect_timeout_ms: 1000

api:
  http:
    listen: ":9199"
    auth:
      type: accounts
      database: "./data/oxidns-next-auth.db"
      bootstrap_token_env: OXIDNS_NEXT_BOOTSTRAP_TOKEN
      session_ttl_seconds: 43200
    webui:
      root: "./webui"

plugins:
  - tag: query_log
    type: query_recorder
    args:
      database:
        type: sqlite
        path: "./data/query-log.sqlite"
      api_cache:
        enabled: true
        records_ttl_ms: 2000
        stats_ttl_ms: 5000
        command_timeout_ms: 100
        max_value_bytes: 1048576
      retention_days: 7

  - tag: dns_cache
    type: cache
    args:
      size: 4096
      redis:
        enabled: true
        command_timeout_ms: 20
        max_inflight: 64
        write_queue_size: 4096
        failure_threshold: 3
        retry_after_ms: 30000

  - tag: forward
    type: forward
    args:
      upstreams:
        - addr: "223.5.5.5"

  - tag: main_sequence
    type: sequence
    args:
      - exec: $query_log
      - exec: $dns_cache
      - exec: $forward
      - exec: accept

  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":53"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":53"
