# OxiDNS Next default configuration file
#
# See full documentation at:
# https://github.com/ciallothu/oxidns-next#readme

log:
  level: info
  # Optional plain-text sink for debug_print/query_summary query events. The
  # searchable query history below is stored independently in its configured
  # SQLite, PostgreSQL, or MySQL database.
  # query_file: "./data/query-events.log"

# Optional shared Redis connection. Defining it alone does not enable Redis;
# uncomment a plugin's redis/api_cache block below to opt in. Redis is only a
# cache layer: DNS falls back to memory/upstream and query APIs fall back to SQL.
# storage:
#   redis:
#     url: "${OXIDNS_NEXT_REDIS_URL}"
#     key_prefix: "oxidns-next"
#     connect_timeout_ms: 1000

# Management API (optional)
api:
  http:
    listen: ":9199"
    # Persistent administrator accounts. The first account can be created by a
    # direct loopback request. Reverse-proxy and remote bootstrap requests must
    # provide a configured bootstrap_token or bootstrap_token_env.
    auth:
      type: accounts
      database: "./data/oxidns-next-auth.db"
      # bootstrap_token_env: OXIDNS_NEXT_BOOTSTRAP_TOKEN
      session_ttl_seconds: 43200
      # For a genuinely cross-site WebUI use cookie_same_site: none together
      # with HTTPS (or cookie_secure: true) and an exact CORS allowed_origins.
      cookie_same_site: lax
      # public_url: "https://dns.example.com"
      # passkey:
      #   rp_id: "dns.example.com"
      #   origins: ["https://dns.example.com"]
      # oidc:
      #   issuer_url: "https://id.example.com"
      #   client_id: "oxidns-next"
      #   client_secret_env: OXIDNS_NEXT_OIDC_CLIENT_SECRET
      #   redirect_url: "https://dns.example.com/api/auth/oidc/callback"
      #   allowed_users:
      #     - claim: "admin@example.com"
      #       username: "admin"
    # Optional static WebUI directory. Relative paths resolve from -d/--working-dir.
    # Debian packages use -d /var/lib/oxidns-next, so ./webui means /var/lib/oxidns-next/webui.
    # API routes are served under /api/*.
    webui:
      root: "./webui"

plugins:
  # Persist structured DNS query history separately from system logs.
  # query_log must be the first main_sequence step so it can observe the
  # complete downstream request/response path through the with_next chain.
  - tag: query_log
    type: query_recorder
    args:
      database:
        type: sqlite
        path: "./data/query-log.sqlite"
        # acquire_timeout_ms: 3000
        # query_timeout_ms: 20000
      # PostgreSQL alternative (replace the database block above):
      # database:
      #   type: postgres
      #   url: "${OXIDNS_NEXT_QUERY_DATABASE_URL}"
      #   max_connections: 8
      #   connect_timeout_ms: 5000
      #   acquire_timeout_ms: 3000
      #   query_timeout_ms: 20000
      # MySQL alternative (replace the active database block above):
      # database:
      #   type: mysql
      #   url: "${OXIDNS_NEXT_QUERY_DATABASE_URL}"
      #   max_connections: 8
      #   connect_timeout_ms: 5000
      #   acquire_timeout_ms: 3000
      #   query_timeout_ms: 20000
      retention_days: 7
      # Optional short-lived Redis cache for history/detail/statistics API responses.
      # Requires the top-level storage.redis block above.
      # api_cache:
      #   enabled: true
      #   records_ttl_ms: 2000
      #   stats_ttl_ms: 5000
      #   command_timeout_ms: 100
      #   max_value_bytes: 1048576

  # Optional DNS response cache with Redis L2. To enable it, uncomment this
  # plugin, the top-level storage.redis block, and `$dns_cache` in the sequence.
  # - tag: dns_cache
  #   type: cache
  #   args:
  #     size: 4096
  #     redis:
  #       enabled: true
  #       command_timeout_ms: 20
  #       max_inflight: 64
  #       write_queue_size: 4096
  #       failure_threshold: 3
  #       retry_after_ms: 30000

  # Forward to upstream DNS servers
  - tag: forward
    type: forward
    args:
      upstreams:
        - addr: "223.5.5.5"

  - tag: main_sequence
    type: sequence
    args:
      - exec: $query_log
      # - exec: $dns_cache
      - exec: $forward
      - exec: accept

  # UDP server listening on :5335
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":5335"

  # TCP server listening on :5335
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":5335"
