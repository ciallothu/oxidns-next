name: Release

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/**"
      - "webui/**"
      - "config*.yaml"
      - "packaging/**"
      - "scripts/**"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  webui:
    name: Build WebUI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install WebUI dependencies
        working-directory: webui
        run: pnpm install --frozen-lockfile

      - name: Typecheck WebUI
        working-directory: webui
        run: pnpm typecheck

      - name: Build WebUI
        working-directory: webui
        run: pnpm build

      - name: Upload WebUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: webui-dist
          path: webui/out
          if-no-files-found: error

  release:
    name: Build full ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: webui
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cargo
            make_deb: true
            upx_kind: linux

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cross
            make_deb: false
            upx_kind: linux

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cross
            make_deb: true
            upx_kind: linux

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cross
            make_deb: false
            upx_kind: linux

          - os: ubuntu-latest
            target: i686-unknown-linux-musl
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cross
            make_deb: false
            upx_kind: linux

          - os: ubuntu-latest
            target: arm-unknown-linux-musleabihf
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cross
            make_deb: false
            upx_kind: linux

          - os: macos-latest
            target: x86_64-apple-darwin
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cargo
            make_deb: false
            upx_kind: none

          - os: macos-latest
            target: aarch64-apple-darwin
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cargo
            make_deb: false
            upx_kind: none

          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            exe: oxidns-next
            archive_ext: tar.gz
            build_tool: cross
            make_deb: false
            upx_kind: none

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: oxidns-next.exe
            archive_ext: zip
            build_tool: cargo
            make_deb: false
            upx_kind: windows

          - os: windows-latest
            target: i686-pc-windows-msvc
            exe: oxidns-next.exe
            archive_ext: zip
            build_tool: cargo
            make_deb: false
            upx_kind: windows

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            exe: oxidns-next.exe
            archive_ext: zip
            build_tool: cargo
            make_deb: false
            upx_kind: none

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Download WebUI artifact
        uses: actions/download-artifact@v8
        with:
          name: webui-dist
          path: webui/out

      - name: Install cross
        if: matrix.build_tool == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install cross toolchain for aarch64 GNU
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install cargo-deb
        if: matrix.make_deb
        run: cargo install cargo-deb --locked

      - name: Build release binary with cargo
        if: matrix.build_tool == 'cargo' && matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target "${{ matrix.target }}" --no-default-features --features full

      - name: Build release binary with cargo (Windows)
        if: matrix.build_tool == 'cargo' && matrix.os == 'windows-latest'
        shell: pwsh
        run: cargo build --locked --release --target '${{ matrix.target }}' --no-default-features --features full

      - name: Build release binary with cross
        if: matrix.build_tool == 'cross'
        shell: bash
        run: |
          set -euo pipefail
          cross build --locked --release --target "${{ matrix.target }}" --no-default-features --features full

      # Build .deb BEFORE UPX so cargo-deb strips the original binary, not a packed one.
      - name: Generate deb for target
        if: matrix.make_deb
        run: cargo deb --no-build --target ${{ matrix.target }}

      - name: Find deb artifacts
        if: matrix.make_deb
        run: |
          echo 'Listing created .deb artifacts:'
          find target -type f -name "*.deb" -print

      - name: Upload built .deb artifacts
        if: matrix.make_deb
        uses: actions/upload-artifact@v7
        with:
          name: oxidns-next-${{ matrix.target }}.deb
          path: target/debian/*.deb
          compression-level: 0
          if-no-files-found: error

      - name: Run UPX (supported Linux targets only)
        if: matrix.upx_kind == 'linux'
        continue-on-error: true
        uses: crazy-max/ghaction-upx@v4
        with:
          version: v5.0.2
          files: |
            target/${{ matrix.target }}/release/${{ matrix.exe }}
          args: -q --best --lzma

      - name: Run UPX (supported Windows targets only)
        if: matrix.upx_kind == 'windows'
        continue-on-error: true
        uses: crazy-max/ghaction-upx@v4
        with:
          version: v5.0.2
          files: |
            target/${{ matrix.target }}/release/${{ matrix.exe }}
          args: -q --best --lzma

      - name: Package release (non-Windows)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          EXE="${{ matrix.exe }}"
          DIR="target/${{ matrix.target }}/release"

          ls -lah "$DIR"
          cp config.yaml LICENSE "$DIR"/
          rm -rf "$DIR/webui"
          cp -R webui/out "$DIR/webui"
          tar czf "$DIR/oxidns-next-${TARGET}.tar.gz" -C "$DIR" "$EXE" config.yaml LICENSE webui

      - name: Package release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $TARGET = '${{ matrix.target }}'
          $EXE = '${{ matrix.exe }}'
          $DIR = "target/${{ matrix.target }}/release"

          Write-Output "Files in ${DIR}`n"
          Get-ChildItem -Path $DIR | Write-Output

          Copy-Item -Path "config.yaml" -Destination "$DIR/"
          Copy-Item -Path "LICENSE" -Destination "$DIR/"
          if (Test-Path "$DIR/webui") {
            Remove-Item -Path "$DIR/webui" -Recurse -Force
          }
          Copy-Item -Path "webui/out" -Destination "$DIR/webui" -Recurse

          Compress-Archive `
            -Path "$DIR/$EXE", "$DIR/config.yaml", "$DIR/LICENSE", "$DIR/webui" `
            -DestinationPath "$DIR/oxidns-next-$TARGET.zip" `
            -Force

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxidns-next-${{ matrix.target }}.${{ matrix.archive_ext }}
          path: target/${{ matrix.target }}/release/oxidns-next-${{ matrix.target }}.${{ matrix.archive_ext }}
          compression-level: 0
          if-no-files-found: error

  slim-release:
    name: Build ${{ matrix.bundle }} ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: webui
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: minimal
            target: x86_64-unknown-linux-musl
          - bundle: minimal
            target: aarch64-unknown-linux-musl
          - bundle: standard
            target: x86_64-unknown-linux-musl
          - bundle: standard
            target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.bundle }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Download WebUI artifact
        if: matrix.bundle == 'standard'
        uses: actions/download-artifact@v8
        with:
          name: webui-dist
          path: webui/out

      - name: Build slim release binary
        shell: bash
        run: |
          set -euo pipefail
          cross build \
            --locked \
            --release \
            --target "${{ matrix.target }}" \
            --no-default-features \
            --features "${{ matrix.bundle }}"

      - name: Package slim release
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="${{ matrix.bundle }}"
          TARGET="${{ matrix.target }}"
          DIR="target/${TARGET}/release"
          ARCHIVE="oxidns-next-${BUNDLE}-${TARGET}.tar.gz"

          ls -lah "$DIR"
          cp LICENSE "$DIR"/
          if [[ "$BUNDLE" == "standard" ]]; then
            cp config.yaml "$DIR"/
            rm -rf "$DIR/webui"
            cp -R webui/out "$DIR/webui"
            tar czf "$DIR/${ARCHIVE}" -C "$DIR" oxidns-next config.yaml LICENSE webui
          else
            # minimal: ship the dedicated minimal config (no api/webui block)
            cp config.minimal.yaml "$DIR/config.yaml"
            tar czf "$DIR/${ARCHIVE}" -C "$DIR" oxidns-next config.yaml LICENSE
          fi

      - name: Upload slim archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxidns-next-${{ matrix.bundle }}-${{ matrix.target }}.tar.gz
          path: target/${{ matrix.target }}/release/oxidns-next-${{ matrix.bundle }}-${{ matrix.target }}.tar.gz
          compression-level: 0
          if-no-files-found: error

  docker-smoke:
    name: Smoke test runtime image
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout runtime Dockerfile
        uses: actions/checkout@v7

      - name: Download x86_64 musl release bundle
        uses: actions/download-artifact@v8
        with:
          name: oxidns-next-x86_64-unknown-linux-musl.tar.gz
          path: /tmp/oxidns-next-release

      - name: Prepare image context
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .docker-dist
          mkdir -p .docker-dist
          tar -xzf /tmp/oxidns-next-release/oxidns-next-x86_64-unknown-linux-musl.tar.gz -C .docker-dist
          test -x .docker-dist/oxidns-next
          test -f .docker-dist/config.yaml
          test -f .docker-dist/LICENSE
          test -f .docker-dist/webui/index.html

      - name: Build runtime image
        run: |
          docker build \
            --file packaging/docker/Dockerfile.runtime \
            --build-arg OXIDNS_NEXT_VERSION=${{ github.sha }} \
            --tag oxidns-next-ci:runtime \
            .

      - name: Run image smoke tests
        run: |
          docker run --rm oxidns-next-ci:runtime --version
          docker run --rm --entrypoint test oxidns-next-ci:runtime -f /etc/oxidns-next/webui/index.html

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [release, slim-release, docker-smoke]
    permissions:
      contents: write
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v7

      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: oxidns-next-*
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.deb" \) | sort

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: OxiDNS Next ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.deb
          fail_on_unmatched_files: true
          generate_release_notes: false
          make_latest: true
          draft: false

  docker:
    name: Publish Docker Images
    if: startsWith(github.ref, 'refs/tags/')
    needs: publish
    uses: ./.github/workflows/docker.yml
    permissions:
      contents: read
      packages: write
    with:
      OXIDNS_NEXT_VERSION: ${{ github.ref_name }}
