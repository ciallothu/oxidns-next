# OxiDNS minimal configuration file
#
# Shipped with `minimal` bundle builds. Drops every section that depends on
# features outside the minimal bundle (api, webui, encrypted protocols, ...).
#
# See full documentation at:
# https://oxidns.org

log:
  level: info

# Management API and WebUI are not available in the minimal bundle.
# Uncomment after upgrading to a `standard` or `full` build.
# api:
#   http:
#     listen: ":9199"
#     webui:
#       root: "./webui"

plugins:
  # Forward to upstream DNS servers
  - tag: forward
    type: forward
    args:
      upstreams:
        - addr: "223.5.5.5"

  - tag: main_sequence
    type: sequence
    args:
      - exec: $forward
      - exec: accept

  # UDP server listening on :5335
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":5335"

  # TCP server listening on :5335
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":5335"
